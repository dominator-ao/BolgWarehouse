#---------------------------
# Hexo Theme Fluid 覆盖配置
# 文档: https://fluid.ist/docs/guide/
#---------------------------

#---------------------------
# 全局
#---------------------------

favicon: /img/avatar.svg
apple_touch_icon: /img/avatar.svg
tab_title_separator: " | "
force_https: false

# 代码块
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github-dark"
      style_dark: "github-dark"
    prismjs:
      style: "default"
      style_dark: "tomorrow night"
      preprocess: true

# 打字机效果
fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: "_"
    loop: true
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 3
    color: "#29d"
    options: { showSpinner: false, trickleSpeed: 100 }

# 暗色模式
dark_mode:
  enable: true
  default: auto

# 主题颜色
color:
  body_bg_color: "#f5f7fa"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"
  sec_text_color: "#718096"
  sec_text_color_dark: "#a7a9ad"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#c4c6c9"
  post_link_color: "#0366d6"
  post_link_color_dark: "#1589e9"
  link_hover_color: "#30a9de"
  link_hover_color_dark: "#30a9de"
  link_hover_bg_color: "#f8f9fa"
  link_hover_bg_color_dark: "#364151"
  line_color: "#eaecef"
  line_color_dark: "#435266"
  scrollbar_color: "#c4c6c9"
  scrollbar_color_dark: "#687582"
  scrollbar_hover_color: "#a6a6a6"
  scrollbar_hover_color_dark: "#9da8b3"
  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#f2f3f5"
  button_hover_bg_color_dark: "#46647e"

# 字体
font:
  font_size: 16px
  font_family: "'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif"
  letter_spacing: 0.02em
  code_font_size: 85%

# 网页统计
web_analytics:
  enable: false

# 懒加载
lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: true
  offset_factor: 2

# 图标库
iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css


#---------------------------
# 页头 Header
#---------------------------

navbar:
  blog_title: "Dominator's Blog"
  ground_glass:
    enable: false
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill", name: "关于" }

# 搜索
search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

# Banner 随机图
banner:
  random_img: true
  parallax: true
  width_height_ratio: 1.0

# 向下箭头
scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

# 向上箭头
scroll_top_arrow:
  enable: true

# Open Graph
open_graph:
  enable: true
  twitter_card: summary_large_image


#---------------------------
# 页脚 Footer
#---------------------------

footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
    <span>&nbsp;|&nbsp;</span>
    <span>Powered by Dominator</span>
  '
  statistics:
    enable: false
    source: "busuanzi"
  beian:
    enable: false


#---------------------------
# 首页 Home
#---------------------------

index:
  banner_img: /img/bg/banner.svg
  banner_img_height: 60
  banner_mask_alpha: 0.3
  slogan:
    enable: true
    text: "Code · Create · Evolve"
  post_info:
    enable: true
  auto_excerpt:
    enable: true
    length: 150
  post_url_target: _self


#---------------------------
# 文章页 Post
#---------------------------

post:
  banner_img: /img/bg/banner.svg
  banner_img_height: 50
  banner_mask_alpha: 0.3
  default_index_img: /img/bg/banner.svg
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "YYYY-MM-DD HH:mm:ss"
    wordcount:
      enable: true
      format: "{} 字"
    min2read:
      enable: true
      format: "{} 分钟"
    views:
      enable: false
  copyright:
    enable: true
    content: "本博客所有文章除特别声明外，均采用 CC BY-NC-SA 4.0 许可协议。转载请注明出处！"
    author: "Dominator"
    link: "https://dominator-ao.github.io/BolgWarehouse/"
    license: "CC BY-NC-SA 4.0"
    license_link: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
  toc:
    enable: true
    list_number: true
    max_depth: 3
  prev_next:
    enable: true
  recommend:
    enable: true
    header: "相关推荐"


#---------------------------
# 归档页 Archives
#---------------------------

archive:
  banner_img: /img/bg/banner.svg
  banner_img_height: 40
  banner_mask_alpha: 0.3


#---------------------------
# 分类页 Categories
#---------------------------

category:
  banner_img: /img/bg/banner.svg
  banner_img_height: 40
  banner_mask_alpha: 0.3


#---------------------------
# 标签页 Tags
#---------------------------

tag:
  banner_img: /img/bg/banner.svg
  banner_img_height: 40
  banner_mask_alpha: 0.3


#---------------------------
# 关于页 About
#---------------------------

about:
  enable: true
  banner_img: /img/bg/banner.svg
  banner_img_height: 50
  banner_mask_alpha: 0.3
  title: "关于我"
  subtitle: "一个热爱技术的开发者"
  avatar: /img/avatar.svg
  name: "Dominator"
  introduce: "热爱编程，热爱技术，热爱生活。专注于 .NET 开发、前端技术和 AI 应用。"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/dominator-ao" }
    - { class: "iconfont icon-gitee-fill", link: "https://gitee.com/tb-my-warehouse" }
    - { class: "iconfont icon-wechat-fill", link: "https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=MzU4ODc3NTY2MA==&uin=&key=&devicetype=UnifiedPCWindows&version=f2541923&lang=zh_CN&a8scene=7" }


#---------------------------
# 友情链接页 Links
#---------------------------

links:
  enable: false
  banner_img: /img/bg/banner.svg
  banner_img_height: 40
  banner_mask_alpha: 0.3


#---------------------------
# 404 页
#---------------------------

page404:
  enable: true
  banner_img: /img/bg/banner.svg
  banner_img_height: 40
  banner_mask_alpha: 0.3
  subtitle: "找不到页面了~"
