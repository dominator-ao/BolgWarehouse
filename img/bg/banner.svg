<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="600" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="150" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="400" cy="50" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="550" cy="200" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="700" cy="100" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="850" cy="180" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1000" cy="60" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="1150" cy="140" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1300" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="1450" cy="170" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1600" cy="50" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="1750" cy="120" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1850" cy="200" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="150" cy="400" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="450" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="600" cy="500" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="900" cy="480" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="1200" cy="520" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1500" cy="460" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="1800" cy="530" r="1" fill="#fff" opacity="0.4"/>
  <!-- Decorative lines -->
  <line x1="0" y1="380" x2="1920" y2="380" stroke="#667eea" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="390" x2="1920" y2="390" stroke="#f093fb" stroke-width="0.3" opacity="0.08"/>
  <!-- Title -->
  <text x="960" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="72" font-weight="bold" fill="url(#text)" filter="url(#glow)">Dominator's Blog</text>
  <text x="960" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#a0a0c0" letter-spacing="12" opacity="0.8">CODE · CREATE · EVOLVE</text>
  <!-- Decorative dots -->
  <circle cx="960" cy="350" r="3" fill="#667eea" opacity="0.5"/>
  <circle cx="940" cy="350" r="2" fill="#667eea" opacity="0.3"/>
  <circle cx="980" cy="350" r="2" fill="#667eea" opacity="0.3"/>
</svg>
